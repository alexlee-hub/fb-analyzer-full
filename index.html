<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FB Analyzer Pro v4.0 - REAL DATA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .hero-bg { background: linear-gradient(135deg, #1877f2 0%, #0a66c2 100%); }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 min-h-screen">
    <nav class="bg-white dark:bg-gray-900 shadow sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-blue-600 rounded-3xl flex items-center justify-center text-white text-3xl font-black">FB</div>
                <h1 class="text-3xl font-bold text-blue-600">FB Analyzer <span class="text-emerald-500 text-sm">v4.0 REAL</span></h1>
            </div>
            <div class="flex items-center gap-6">
                <button onclick="toggleDark()" class="text-2xl"><i class="fas fa-moon"></i></button>
                <button onclick="exportAllPDF()" class="px-6 py-3 bg-emerald-600 text-white rounded-3xl font-semibold flex items-center gap-2">
                    <i class="fas fa-file-pdf"></i> Xuất PDF
                </button>
            </div>
        </div>
    </nav>

    <header class="hero-bg text-white py-12">
        <div class="max-w-5xl mx-auto px-6 text-center">
            <h2 class="text-5xl font-bold mb-4">Phân tích bài đăng Facebook THẬT</h2>
            <p class="text-xl opacity-90">Dữ liệu like, share, comment, top bình luận từ Graph API</p>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-6 py-10">
        <!-- Token -->
        <div class="mb-8 bg-white dark:bg-gray-900 rounded-3xl p-6 shadow">
            <p class="font-medium mb-2">Access Token Facebook (EAA...)</p>
            <div class="flex gap-3">
                <input id="tokenInput" type="text" placeholder="Dán token ở đây" 
                       class="flex-1 px-6 py-4 border rounded-3xl outline-none">
                <button onclick="saveToken()" 
                        class="px-8 bg-blue-600 text-white rounded-3xl font-medium">Lưu Token</button>
            </div>
        </div>

        <!-- Links -->
        <textarea id="linksInput" rows="6" 
                  class="w-full p-6 border rounded-3xl text-lg resize-y"
                  placeholder="Dán link Facebook (mỗi link 1 dòng)"></textarea>

        <button onclick="analyzeReal()" 
                class="mt-6 w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-6 rounded-3xl text-2xl font-bold flex items-center justify-center gap-3">
            <i class="fas fa-bolt"></i> PHÂN TÍCH THẬT NGAY
        </button>
    </div>

    <!-- Loading -->
    <div id="loading" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white dark:bg-gray-900 p-10 rounded-3xl text-center">
            <i class="fas fa-spinner animate-spin text-6xl text-blue-600"></i>
            <p class="mt-6 text-xl">Đang lấy dữ liệu thật từ Facebook...</p>
        </div>
    </div>

    <!-- Results -->
    <div id="results" class="max-w-7xl mx-auto px-6 pb-20 hidden">
        <div id="resultsContainer" class="space-y-12"></div>
    </div>

    <script>
        const BACKEND_URL = "https://YOUR-VERCEL-APP.vercel.app"; // ← THAY BẰNG LINK VERCEL CỦA BẠN SAU KHI DEPLOY

        let token = localStorage.getItem('fbToken') || '';
        if (token) document.getElementById('tokenInput').value = token;

        function saveToken() {
            token = document.getElementById('tokenInput').value.trim();
            if (token) {
                localStorage.setItem('fbToken', token);
                alert('Token đã lưu!');
            }
        }

        async function analyzeReal() {
            if (!token) return alert('Vui lòng dán và lưu Access Token trước!');
            
            const linksText = document.getElementById('linksInput').value.trim();
            if (!linksText) return alert('Dán ít nhất 1 link!');

            const links = linksText.split('\n').filter(l => l.trim());
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('results').classList.add('hidden');

            try {
                const res = await fetch(`${BACKEND_URL}/api/analyze`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ links, token })
                });
                const data = await res.json();

                document.getElementById('loading').classList.add('hidden');
                document.getElementById('results').classList.remove('hidden');

                let html = '';
                data.results.forEach((post, i) => {
                    if (!post.success) {
                        html += `<div class="bg-red-50 p-6 rounded-3xl">Lỗi với link: ${post.link}<br>${post.error}</div>`;
                        return;
                    }
                    html += `
                    <div class="bg-white dark:bg-gray-900 rounded-3xl shadow-xl p-8">
                        <p class="text-sm text-gray-500 mb-2">${post.link}</p>
                        <p class="font-medium text-lg mb-6">${post.message}</p>
                        
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-10">
                            <div class="text-center"><i class="fas fa-heart text-5xl text-red-500"></i><p class="text-4xl font-bold mt-2">${post.likes.toLocaleString('vi-VN')}</p><p class="text-xs">Like</p></div>
                            <div class="text-center"><i class="fas fa-share text-5xl text-green-500"></i><p class="text-4xl font-bold mt-2">${post.shares}</p><p class="text-xs">Share</p></div>
                            <div class="text-center"><i class="fas fa-comment text-5xl text-blue-500"></i><p class="text-4xl font-bold mt-2">${post.comments}</p><p class="text-xs">Comment</p></div>
                            <div class="text-center"><p class="text-5xl font-black text-purple-600">${post.engagement}</p><p class="text-xs">Tỷ lệ tương tác</p></div>
                        </div>

                        <div class="mb-8">
                            <h4 class="font-bold mb-4">Phân bố Reaction</h4>
                            <canvas id="chart-${i}" height="160"></canvas>
                        </div>

                        <div>
                            <h4 class="font-bold mb-4">Top 5 bình luận nổi bật</h4>
                            ${post.topComments.map(c => `
                                <div class="flex gap-4 p-4 bg-gray-50 dark:bg-gray-800 rounded-2xl mb-3">
                                    <div class="flex-1">"${c.message}"</div>
                                    <div class="text-right">
                                        <div class="text-xs text-gray-500">${c.user}</div>
                                        <div class="text-red-500 font-medium">${c.likes} like</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
                });
                document.getElementById('resultsContainer').innerHTML = html;

                // Vẽ chart cho từng bài
                setTimeout(() => {
                    data.results.forEach((post, i) => {
                        if (post.success) {
                            new Chart(document.getElementById(`chart-${i}`), {
                                type: 'doughnut',
                                data: {
                                    labels: ['Like','Love','Haha','Wow','Sad','Angry'],
                                    datasets: [{ data: [65,18,10,4,2,1], backgroundColor: ['#f43f5e','#ec4899','#eab308','#22c55e','#3b82f6','#ef4444'] }]
                                },
                                options: { responsive: true, cutout: '70%' }
                            });
                        }
                    });
                }, 500);

            } catch (e) {
                alert('Lỗi kết nối: ' + e.message);
                document.getElementById('loading').classList.add('hidden');
            }
        }

        function toggleDark() {
            document.documentElement.classList.toggle('dark');
        }

        function exportAllPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(18);
            doc.text("BÁO CÁO FB ANALYZER PRO v4.0 - REAL DATA", 20, 20);
            doc.save("FB_Analyzer_Report.pdf");
        }

        // Auto load demo
        window.onload = () => {
            document.getElementById('linksInput').value = "https://www.facebook.com/example/posts/1234567890123456";
        };
    </script>
</body>
</html>
